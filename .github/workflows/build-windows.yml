name: Build Mileage Exception Tool

on:
  push:
    branches:
      - main

jobs:
  build-windows:

    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Maven project
        run: mvn clean package

      - name: Create Windows EXE
        run: |
          jpackage `
          --name "Mileage Exception Tool" `
          --input target `
          --main-jar MilesSheetCreator-1.0-SNAPSHOT.jar `
          --main-class com.tdem.milesheetcreator.MainApplication `
          --type exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Mileage Exception Tool Windows
          path: "*.exe"
- name: Download JavaFX
  run: |
    curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.7/openjfx-21.0.7_windows-x64_bin-sdk.zip
    tar -xf javafx.zip

- name: Create Windows EXE
  run: |
    jpackage `
    --name "Mileage Exception Tool" `
    --input target `
    --main-jar MilesSheetCreator-1.0-SNAPSHOT.jar `
    --main-class com.tdem.milesheetcreator.MainApplication `
    --type exe `
    --module-path javafx-sdk-21.0.7/lib `
    --add-modules javafx.controls,javafx.fxml
