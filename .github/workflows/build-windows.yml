name: Build Windows Installer

on:
  push:
    branches:
      - main


jobs:

  build-windows:

    runs-on: windows-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin


      - name: Build Jar
        run: mvn clean package


      - name: Download JavaFX
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.7/openjfx-21.0.7_windows-x64_bin-sdk.zip
          tar -xf javafx.zip


      - name: Create Installer
        shell: powershell
        run: |
          jpackage `
            --name "Mileage Exception Tool" `
            --input target `
            --main-jar MilesSheetCreator-1.0.jar `
            --main-class com.tdem.milesheetcreator.Launcher `
            --type exe `
            --module-path javafx-sdk-21.0.7/lib `
            --add-modules javafx.controls,javafx.fxml `
            --win-menu `
            --win-shortcut `
            --icon car.ico


      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Mileage Exception Tool Windows
          path: "*.exe"